# Veydrune SwiftLint Configuration
# Tuned for Swift 6, SwiftUI, @Observable/@MainActor codebase

included:
  - Veydrune

excluded:
  - DerivedData
  - .build
  - Veydrune.xcodeproj

# Rules
disabled_rules:
  - trailing_comma           # Style preference — allow trailing commas
  - multiple_closures_with_trailing_closure  # Common in SwiftUI
  - identifier_name          # Short names (x, id, i) are fine in context
  - type_name                # Allow short type names
  - nesting                  # SwiftUI views naturally nest deeply
  - opening_brace            # Conflicts with some SwiftUI patterns

opt_in_rules:
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - empty_count
  - empty_string
  - fatal_error_message
  - first_where
  - implicit_return
  - last_where
  - modifier_order
  - overridden_super_call
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call

# Thresholds tuned for this codebase
# AudioEngine=563, CarPlayManager=525, SmartPlaylistView=498
file_length:
  warning: 575
  error: 700

type_body_length:
  warning: 450
  error: 600

function_body_length:
  warning: 60
  error: 100

line_length:
  warning: 150
  error: 200
  ignores_comments: true
  ignores_urls: true

cyclomatic_complexity:
  warning: 15
  error: 25

large_tuple:
  warning: 4

# Force unwrapping/try as warnings (not errors) — some are intentional
force_cast:
  severity: warning

force_try:
  severity: warning

# Allow TODO/FIXME as warnings
todo:
  severity: warning
