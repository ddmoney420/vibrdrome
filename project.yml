name: Vibrdrome
options:
  bundleIdPrefix: com.vibrdrome
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    STRICT_CONCURRENCY: complete
    GENERATE_INFOPLIST_FILE: false
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_EMIT_LOC_STRINGS: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES

packages:
  Nuke:
    url: https://github.com/kean/Nuke
    from: "12.0.0"
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess
    from: "4.2.2"

schemes:
  Vibrdrome:
    build:
      targets:
        Vibrdrome: all
        VibrdromeTests: [test]
        VibrdromeUITests: [test]
        VibrdromeUITestsMac: [test]
    test:
      targets:
        - VibrdromeTests
        - VibrdromeUITests
        - VibrdromeUITestsMac
      environmentVariables:
        - variable: TEST_SERVER_URL
          value: "$(TEST_SERVER_URL)"
          isEnabled: true
        - variable: TEST_SERVER_USER
          value: "$(TEST_SERVER_USER)"
          isEnabled: true
        - variable: TEST_SERVER_PASS
          value: "$(TEST_SERVER_PASS)"
          isEnabled: true
  VibrdromeWatch:
    build:
      targets:
        VibrdromeWatch: all
  VibrdromeMac:
    build:
      targets:
        Vibrdrome: all
        VibrdromeUITestsMac: [test]
    test:
      targets:
        - VibrdromeUITestsMac
      environmentVariables:
        - variable: TEST_SERVER_URL
          value: "$(TEST_SERVER_URL)"
          isEnabled: true
        - variable: TEST_SERVER_USER
          value: "$(TEST_SERVER_USER)"
          isEnabled: true
        - variable: TEST_SERVER_PASS
          value: "$(TEST_SERVER_PASS)"
          isEnabled: true

targets:
  Vibrdrome:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: Vibrdrome
        excludes:
          - Info-macOS.plist
      - path: Shared
    settings:
      base:
        INFOPLIST_FILE: Vibrdrome/Info.plist
        CODE_SIGN_ENTITLEMENTS: Vibrdrome/Vibrdrome.entitlements
        DEVELOPMENT_TEAM: 85JD2B827Q
        PRODUCT_BUNDLE_IDENTIFIER: com.vibrdrome.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "43"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: "YES"
      configs:
        debug:
          INFOPLIST_FILE[sdk=macosx*]: Vibrdrome/Info-macOS.plist
        release:
          INFOPLIST_FILE[sdk=macosx*]: Vibrdrome/Info-macOS.plist
    dependencies:
      - package: Nuke
        product: NukeUI
      - package: KeychainAccess
      - target: VibrdromeWidget
        platformFilter: iOS
      - target: VibrdromeWatch
        platformFilter: iOS
    entitlements:
      path: Vibrdrome/Vibrdrome.entitlements

  VibrdromeWidget:
    type: app-extension
    supportedDestinations: [iOS]
    sources:
      - path: VibrdromeWidget
      - path: Shared
    settings:
      base:
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: VibrdromeWidget/Info.plist
        DEVELOPMENT_TEAM: 85JD2B827Q
        PRODUCT_BUNDLE_IDENTIFIER: com.vibrdrome.app.widget
        CODE_SIGN_ENTITLEMENTS: VibrdromeWidget/VibrdromeWidget.entitlements
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "43"
    entitlements:
      path: VibrdromeWidget/VibrdromeWidget.entitlements

  VibrdromeWatch:
    type: application
    platform: watchOS
    deploymentTarget:
      watchOS: "11.0"
    sources:
      - path: VibrdromeWatch
    settings:
      base:
        INFOPLIST_FILE: VibrdromeWatch/Info.plist
        DEVELOPMENT_TEAM: 85JD2B827Q
        PRODUCT_BUNDLE_IDENTIFIER: com.vibrdrome.app.watchkitapp
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "43"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "6.0"

  VibrdromeTests:
    type: bundle.unit-test
    supportedDestinations: [iOS, macOS]
    sources:
      - path: VibrdromeTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: Vibrdrome

  VibrdromeUITests:
    type: bundle.ui-testing
    supportedDestinations: [iOS]
    sources:
      - path: VibrdromeUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: Vibrdrome

  VibrdromeUITestsMac:
    type: bundle.ui-testing
    supportedDestinations: [macOS]
    sources:
      - path: VibrdromeUITestsMac
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: Vibrdrome
