name: Veydrune
options:
  bundleIdPrefix: com.veydrune
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    STRICT_CONCURRENCY: complete
    GENERATE_INFOPLIST_FILE: false

packages:
  Nuke:
    url: https://github.com/kean/Nuke
    from: "12.0.0"
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess
    from: "4.2.2"

targets:
  Veydrune:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: Veydrune
        excludes:
          - Info-macOS.plist
    settings:
      base:
        INFOPLIST_FILE: Veydrune/Info.plist
        CODE_SIGN_ENTITLEMENTS: Veydrune/Veydrune.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.veydrune.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        debug:
          INFOPLIST_FILE[sdk=macosx*]: Veydrune/Info-macOS.plist
        release:
          INFOPLIST_FILE[sdk=macosx*]: Veydrune/Info-macOS.plist
    dependencies:
      - package: Nuke
        product: NukeUI
      - package: KeychainAccess
    entitlements:
      path: Veydrune/Veydrune.entitlements
