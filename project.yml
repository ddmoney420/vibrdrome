name: Vibrdrome
options:
  bundleIdPrefix: com.vibrdrome
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    STRICT_CONCURRENCY: complete
    GENERATE_INFOPLIST_FILE: false

packages:
  Nuke:
    url: https://github.com/kean/Nuke
    from: "12.0.0"
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess
    from: "4.2.2"

schemes:
  Vibrdrome:
    build:
      targets:
        Vibrdrome: all
        VibrdromeTests: [test]
        VibrdromeUITests: [test]
        VibrdromeUITestsMac: [test]
    test:
      targets:
        - VibrdromeTests
        - VibrdromeUITests
        - VibrdromeUITestsMac
  VibrdromeMac:
    build:
      targets:
        Vibrdrome: all
        VibrdromeUITestsMac: [test]
    test:
      targets:
        - VibrdromeUITestsMac

targets:
  Vibrdrome:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: Vibrdrome
        excludes:
          - Info-macOS.plist
    settings:
      base:
        INFOPLIST_FILE: Vibrdrome/Info.plist
        CODE_SIGN_ENTITLEMENTS: Vibrdrome/Vibrdrome.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.vibrdrome.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        debug:
          INFOPLIST_FILE[sdk=macosx*]: Vibrdrome/Info-macOS.plist
        release:
          INFOPLIST_FILE[sdk=macosx*]: Vibrdrome/Info-macOS.plist
    dependencies:
      - package: Nuke
        product: NukeUI
      - package: KeychainAccess
    entitlements:
      path: Vibrdrome/Vibrdrome.entitlements

  VibrdromeTests:
    type: bundle.unit-test
    supportedDestinations: [iOS, macOS]
    sources:
      - path: VibrdromeTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: Vibrdrome

  VibrdromeUITests:
    type: bundle.ui-testing
    supportedDestinations: [iOS]
    sources:
      - path: VibrdromeUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: Vibrdrome

  VibrdromeUITestsMac:
    type: bundle.ui-testing
    supportedDestinations: [macOS]
    sources:
      - path: VibrdromeUITestsMac
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: Vibrdrome
