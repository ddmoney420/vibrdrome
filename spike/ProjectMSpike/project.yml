# ProjectMSpike — Phase 0 toolchain spike (NOT the main app).
# Smallest possible MGLKView / GLES3 clear-screen test to prove MetalANGLE
# renders on a physical iPhone and on a Mac. Generated project is gitignored;
# this project.yml + Sources/ are committed. See docs/projectm-integration-plan.md.
#
# Generate + build:
#   cd spike/ProjectMSpike && xcodegen generate
#   xcodebuild -project ProjectMSpike.xcodeproj -scheme ProjectMSpike -destination 'platform=macOS' build
name: ProjectMSpike
options:
  bundleIdPrefix: com.vibrdrome
  deploymentTarget:
    iOS: "18.0"
    macOS: "15.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: "YES"
    SWIFT_OBJC_BRIDGING_HEADER: Sources/ProjectMSpike-Bridging-Header.h
    DEVELOPMENT_TEAM: 85JD2B827Q
    # iOS keeps Frameworks next to the executable; macOS puts them in
    # Contents/Frameworks (one level up). Cover both so the embedded
    # MetalANGLE.framework resolves at runtime on either platform.
    LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../Frameworks @loader_path/../Frameworks"
    INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
targets:
  ProjectMSpike:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - Sources
      - path: Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vibrdrome.projectmspike
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - framework: ../../Vendor/MetalANGLE/MetalANGLE.xcframework
        embed: true
        codeSign: true
      - framework: ../../Vendor/projectM/projectM.xcframework
        embed: true
        codeSign: true
